<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini CRM - Lead Management</title>

<style>
body{
  font-family: Arial;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

h1{
  margin-top:20px;
}

.container{
  margin:20px auto;
  width:80%;
}

input{
  padding:10px;
  margin:5px;
  width:200px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px 15px;
  margin:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
  background:#ffd369;
  font-weight:bold;
}

.card{
  background:rgba(255,255,255,0.1);
  padding:15px;
  margin:10px auto;
  width:60%;
  border-radius:10px;
  backdrop-filter:blur(10px);
}

.status{
  font-weight:bold;
  color:#ffd369;
}
</style>
</head>

<body>

<h1>📊 Client Lead Management System</h1>

<div class="container">

<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="source" placeholder="Source">

<button onclick="addLead()">Add Lead</button>

</div>

<h2>📌 Leads</h2>
<div id="list"></div>

<script>

// Load data
let leads = JSON.parse(localStorage.getItem("leads")) || [];

// Add Lead
function addLead(){
  let lead = {
    id: Date.now(),
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    source: document.getElementById("source").value,
    status: "New",
    notes: ""
  };

  leads.push(lead);
  localStorage.setItem("leads", JSON.stringify(leads));
  showLeads();
}

// Show Leads
function showLeads(){
  let list = document.getElementById("list");
  list.innerHTML = "";

  leads.forEach(l => {
    list.innerHTML += `
      <div class="card">
        <h3>${l.name}</h3>
        <p>${l.email}</p>
        <p>Source: ${l.source}</p>
        <p class="status">Status: ${l.status}</p>

        <button onclick="contacted(${l.id})">Mark Contacted</button>
        <button onclick="convert(${l.id})">Convert</button>
        <button onclick="removeLead(${l.id})">Delete</button>
      </div>
    `;
  });
}

// Update status
function contacted(id){
  leads = leads.map(l => l.id === id ? {...l, status:"Contacted"} : l);
  save();
}

function convert(id){
  leads = leads.map(l => l.id === id ? {...l, status:"Converted"} : l);
  save();
}

// Delete
function removeLead(id){
  leads = leads.filter(l => l.id !== id);
  save();
}

// Save
function save(){
  localStorage.setItem("leads", JSON.stringify(leads));
  showLeads();
}

// Init
showLeads();

</script>

</body>
</html>
