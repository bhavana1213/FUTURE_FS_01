<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Modern CRM</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  margin:0;
}


/* HEADER */
.header{
  text-align:center;
  padding:15px;
  background:#020617;
  font-size:20px;
}

/* FORM */
.form{
  padding:15px;
}

input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:#38bdf8;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

/* CARD */
.card{
  background:#1e293b;
  margin:10px;
  padding:15px;
  border-radius:12px;
}

.status{
  font-weight:bold;
}

.new{color:yellow;}
.contacted{color:cyan;}
.converted{color:lime;}

.actions button{
  width:auto;
  margin:5px 3px;
  padding:6px 10px;
}
</style>
</head>

<body>

<div class="header">📱 Modern CRM</div>

<div class="form">
  <input id="name" placeholder="Name">
  <input id="email" placeholder="Email">
  <input id="phone" placeholder="Phone">
  <input id="source" placeholder="Source">

  <button onclick="addLead()">Add Lead</button>
</div>

<div id="list"></div>

<script>

let leads = JSON.parse(localStorage.getItem("leads")) || [];

function addLead(){

  let name = document.getElementById("name").value;
  let email = document.getElementById("email").value;
  let phone = document.getElementById("phone").value;
  let source = document.getElementById("source").value;

  if(!name || !email){
    alert("Enter Name & Email");
    return;
  }

  leads.push({
    id: Date.now(),
    name,
    email,
    phone,
    source,
    status:"New"
  });

  save();

  document.querySelectorAll("input").forEach(i=>i.value="");
}

function showLeads(){

  let list = document.getElementById("list");
  list.innerHTML="";

  leads.forEach(l=>{

    let cls =
      l.status==="New"?"new":
      l.status==="Contacted"?"contacted":"converted";

    list.innerHTML += `
    <div class="card">
      <h3>${l.name}</h3>
      <p>${l.email}</p>
      <p>${l.phone}</p>
      <p>📍 ${l.source}</p>
      <p class="status ${cls}">${l.status}</p>

      <div class="actions">
        <button onclick="contacted(${l.id})">Contacted</button>
        <button onclick="convert(${l.id})">Convert</button>
        <button onclick="removeLead(${l.id})">Delete</button>
      </div>
    </div>`;
  });
}

function contacted(id){
  leads = leads.map(l=>l.id===id?{...l,status:"Contacted"}:l);
  save();
}

function convert(id){
  leads = leads.map(l=>l.id===id?{...l,status:"Converted"}:l);
  save();
}

function removeLead(id){
  leads = leads.filter(l=>l.id!==id);
  save();
}

function save(){
  localStorage.setItem("leads", JSON.stringify(leads));
  showLeads();
}

showLeads();

</script>

</body>
</html>
